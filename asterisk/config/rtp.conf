; ================================================================
; RTP (Real-time Transport Protocol) Config
; Audio streams for SIP calls use RTP.
; ================================================================
[general]
rtpstart = 10000     ; RTP port range start
rtpend   = 10100     ; RTP port range end (100 concurrent calls max)
icesupport = no      ; Disable ICE (not needed for LAN calls)
stunaddr =           ; No STUN (local network only)
