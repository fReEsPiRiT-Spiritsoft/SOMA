; ================================================================
; PJSIP Template — SOMA Phone Gateway (Linhome Free SIP)
; Generated at container startup by entrypoint.sh via envsubst
;
; LINHOME-KONTO (https://www.linhome.org):
;   SIP-Adresse:   sip:pattyhomeserver@sip.linhome.org
;   Domain/Proxy:  sip.linhome.org
;   Rufnummer:     +4929825810063
;
; .env Variablen:
;   VODAFONE_SIP_HOST=sip.linhome.org
;   VODAFONE_SIP_USER=pattyhomeserver
;   VODAFONE_SIP_PASS=<dein Passwort>
;
; docker compose build asterisk && docker compose up -d asterisk
; ================================================================

; ── Transport ─────────────────────────────────────────────────────────
; Port 5160 statt 5060 — viele Router blocken 5060 wegen SIP ALG
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:8160
external_media_address = 176.199.202.209
external_signaling_address = 176.199.202.209
external_signaling_port = 8160
local_net = 192.168.0.0/24

; ── Auth für Linhome SIP ──────────────────────────────────────────────
[soma-auth]
type = auth
auth_type = userpass
username = pattyhomeserver
password = P94S19!loVe

; ── AOR — für outbound Registration (kein statischer Contact!) ────────
[soma-aor]
type = aor
max_contacts = 1
; KEIN contact= hier! Bei outbound registration setzt Asterisk den Contact
; automatisch auf die eigene IP. Ein statischer contact würde dazu führen,
; dass Linhome Anrufe an sich selbst zurückleitet statt an uns.
qualify_frequency = 60
qualify_timeout = 5.0

; ── Endpoint — eingehende Anrufe von Linhome ─────────────────────────
[soma-endpoint]
type = endpoint
transport = transport-udp
context = from-phone
disallow = all
allow = opus
allow = g722
allow = ulaw
allow = alaw
auth = soma-auth
aors = soma-aor
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733

; ── Identify — Asterisk erkennt Anrufe von Linhome ───────────────────
[soma-identify]
type = identify
endpoint = soma-endpoint
match = sip.linhome.org

; ── Registration — Asterisk meldet sich bei Linhome an ───────────────
; Kurze Expiration (120s) hält die NAT-Session offen damit
; eingehende INVITEs durch die Firewall kommen.
[soma-registration]
type = registration
transport = transport-udp
outbound_auth = soma-auth
outbound_proxy = sip:sip.linhome.org\;lr
server_uri = sip:sip.linhome.org
client_uri = sip:pattyhomeserver@sip.linhome.org
contact_user = pattyhomeserver
retry_interval = 30
max_retries = 0
expiration = 120
line = yes
endpoint = soma-endpoint

; ================================================================
; LINPHONE — Lokaler SIP-Client (Smartphone / Desktop via LAN)
; ================================================================
;
; Linphone installieren: https://www.linphone.org/en/download
; SIP-Konto: sip:soma@192.168.0.59  |  Passwort: LINPHONE_SIP_PASS
; Transport: UDP, Port 5060
;
; .env: LINPHONE_SIP_PASS=dein_sicheres_passwort
; ================================================================

; ── Auth für Linphone-Client ──────────────────────────────────────────
[linphone-auth]
type = auth
auth_type = userpass
username = soma
password = soma_linphone_secret

; ── AOR — wo Linphone erreichbar ist ─────────────────────────────────
[linphone-aor]
type = aor
max_contacts = 5
qualify_frequency = 30
remove_existing = yes

; ── Endpoint — Linphone registriert sich hier ─────────────────────────
[linphone-endpoint]
type = endpoint
transport = transport-udp
context = from-linphone
disallow = all
allow = opus           ; Linphone-Favorit (mobile-optimiert)
allow = g722           ; HD Voice fallback
allow = ulaw           ; PCMU Kompatibilität
allow = alaw           ; PCMA Kompatibilität
auth = linphone-auth
aors = linphone-aor
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733
retry_interval = 60
max_retries = 0
expiration = 3600
