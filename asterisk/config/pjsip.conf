; ================================================================
; PJSIP Template — SOMA Phone Gateway
; Generated at container startup by entrypoint.sh via envsubst
;
; EMPFOHLENER WEG: Sipgate Basic (kostenlos)
; ================================================================
;
; EINRICHTUNG (einmalig, ~5 Minuten):
;
; 1. Kostenlosen Account anlegen: https://www.sipgate.de/basic
;    → Du bekommst eine eigene deutsche Rufnummer (z.B. 030/...)
;
; 2. Im Sipgate-Portal → Einstellungen → SIP-Zugangsdaten notieren:
;      SIP-ID:       z.B. 1234567e0   (das ist VODAFONE_SIP_USER)
;      SIP-Passwort: dein Passwort    (das ist VODAFONE_SIP_PASS)
;    Server ist immer: sipgate.de
;
; 3. In .env eintragen:
;      VODAFONE_SIP_HOST=sipgate.de
;      VODAFONE_SIP_USER=1234567e0
;      VODAFONE_SIP_PASS=deinPasswort
;
; 4. Optional: Deine Vodafone-Festnetznummer auf die Sipgate-Nummer weiterleiten
;    → Vodafone Station → Telefon-Einstellungen → Rufumleitung
;    → Auf die Sipgate-Nummer umleiten (dann klingelt SOMA wenn jemand anruft)
;
; 5. docker compose build asterisk && docker compose up -d asterisk
;
; ================================================================

; ── Transport ─────────────────────────────────────────────────────────
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_media_address = 192.168.0.59
external_signaling_address = 192.168.0.59

; ── Auth für Sipgate (oder anderen SIP-Anbieter) ──────────────────────
[soma-auth]
type = auth
auth_type = userpass
username = pattyhomeserver
password = P94S19!loVe

; ── AOR — wo Asterisk erreichbar ist ─────────────────────────────────
[soma-aor]
type = aor
max_contacts = 1

; ── Endpoint — eingehende Anrufe vom SIP-Provider ────────────────────
[soma-endpoint]
type = endpoint
transport = transport-udp
context = from-phone
disallow = all
allow = ulaw
allow = alaw
allow = g722
auth = soma-auth
aors = soma-aor
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes

; ── Identify — Asterisk erkennt Anrufe vom Provider ──────────────────
[soma-identify]
type = identify
endpoint = soma-endpoint
match = sip.linhome.org

; ── Registration — Asterisk meldet sich beim SIP-Provider an ─────────
[soma-registration]
type = registration
transport = transport-udp
outbound_auth = soma-auth
server_uri = sip:sip.linhome.org
client_uri = sip:pattyhomeserver@sip.linhome.org
contact_user = pattyhomeserver

; ================================================================
; LINPHONE — Lokaler SIP-Client (Smartphone / Desktop)
; ================================================================
;
; EINRICHTUNG LINPHONE APP (~2 Minuten):
;
; 1. Linphone installieren (Android/iOS/Desktop):
;       https://www.linphone.org/en/download
;
; 2. In der App → "SIP-Konto hinzufügen" → Manuell konfigurieren:
;       SIP-Adresse:  sip:soma@192.168.0.59
;       Benutzername: soma
;       Passwort:     (Wert von LINPHONE_SIP_PASS in .env)
;       SIP-Server:   192.168.0.59
;       Port:         5060  (UDP)
;       Transport:    UDP
;
; 3. In .env eintragen:
;       LINPHONE_SIP_PASS=dein_sicheres_passwort
;
; 4. docker compose up -d asterisk (neu starten)
; ================================================================

; ── Auth für Linphone-Client ──────────────────────────────────────────
[linphone-auth]
type = auth
auth_type = userpass
username = soma
password = soma_linphone_secret

; ── AOR — wo Linphone erreichbar ist ─────────────────────────────────
[linphone-aor]
type = aor
max_contacts = 5
qualify_frequency = 30
remove_existing = yes

; ── Endpoint — Linphone registriert sich hier ─────────────────────────
[linphone-endpoint]
type = endpoint
transport = transport-udp
context = from-linphone
disallow = all
allow = opus           ; Linphone-Favorit (mobile-optimiert)
allow = g722           ; HD Voice fallback
allow = ulaw           ; PCMU Kompatibilität
allow = alaw           ; PCMA Kompatibilität
auth = linphone-auth
aors = linphone-aor
direct_media = no
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
dtmf_mode = rfc4733
retry_interval = 60
max_retries = 0
expiration = 3600
