; ================================================================
; Asterisk REST Interface (ARI) — SOMA Control Channel
; Python connects via: ws://asterisk:8088/ari/events?app=soma-phone&api_key=soma-ari:SECRET
; ================================================================
[general]
enabled = yes
pretty = yes           ; Pretty-print JSON (easier to debug)
allowed_origins = *    ; Allow SOMA to connect from any host on LAN

[soma-ari]
type = user
password = ${ASTERISK_ARI_PASS}    ; Set in docker-compose env / .env
password_format = plain
