; ================================================================
; Asterisk Dialplan — SOMA Phone Gateway
; ================================================================
;
; [from-phone]  — All incoming calls from Vodafone Station land here.
;                 We immediately hand control to SOMA via ARI Stasis app.
;
; [soma-announce] — Pre-answer announcement if Stasis not reachable.
; ================================================================

[from-phone]
; Eingehender Anruf → Answer → versuche ARI Stasis
; Falls brain_core/ARI nicht verbunden: Fallback-Ansage statt Stille
exten => _X.,1,NoOp(SOMA Phone Gateway: Incoming call from ${CALLERID(all)})
 same => n,Set(CHANNEL(language)=de)
 same => n,Answer()
 same => n,Wait(0.3)
 same => n,Stasis(soma-phone)
 ; Wenn Stasis zurückkehrt (ARI nicht verbunden) → Fallback
 same => n,Playback(vm-sorry&vm-nobodyavail)
 same => n,Hangup()

; Fallback for calls with no extension (direct number call)
exten => s,1,Goto(from-phone,_X.,1)

; Handle "any" pattern — some providers send empty extension
exten => _.,1,Goto(from-phone,_X.,1)

; ================================================================
; [from-linphone] — Anrufe vom Linphone SIP-Client (Smartphone)
; ================================================================
; Linphone wählt einfach eine beliebige Nummer (z.B. 100 oder soma)
; → Direkt in die SOMA ARI App routen, genau wie Festnetz.
[from-linphone]
exten => _X.,1,NoOp(SOMA Linphone: Incoming call from ${CALLERID(all)})
 same => n,Set(CHANNEL(language)=de)
 same => n,Set(SOMA_CALLER_TYPE=linphone)
 same => n,Answer()
 same => n,Wait(0.3)
 same => n,Stasis(soma-phone)
 same => n,Playback(vm-sorry&vm-nobodyavail)
 same => n,Hangup()

; Linphone sendet manchmal "s" oder leere Extension
exten => s,1,Goto(from-linphone,_X.,1)
exten => _.,1,Goto(from-linphone,_X.,1)

; Direktwahl "soma" als Text-Extension (Linphone unterstützt das)
exten => soma,1,Goto(from-linphone,_X.,1)

[soma-announce]
; Played if SOMA is not reachable (ARI not connected)
exten => _.,1,Answer()
 same => n,Playback(vm-sorry)
 same => n,Playback(vm-nobodyavail)
 same => n,Hangup()
