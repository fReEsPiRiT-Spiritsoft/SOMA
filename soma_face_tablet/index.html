<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SOMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #soma-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(0, 255, 136, 0.6);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
        #soma-text {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(0, 255, 136, 0.8);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
            max-width: 80%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #soma-text.visible { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="soma-canvas"></canvas>
    <div id="soma-text"></div>
    <div id="status-bar">SOMA · Listening</div>

    <!-- Three.js via CDN (local in production) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="shader_logic.js"></script>
    <script src="socket_client.js"></script>
</body>
</html>
