<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>SOMA Mobile</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-chat: #111;
            --accent: #00ff88;
            --accent-dim: rgba(0,255,136,0.15);
            --accent-glow: rgba(0,255,136,0.3);
            --text: #e0e0e0;
            --text-dim: #888;
            --user-bg: #1a2a1f;
            --soma-bg: #141414;
            --border: rgba(255,255,255,0.06);
            --danger: #ff4444;
            --radius: 16px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* ── Login Screen ─────────────────────────────────────────── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 24px;
            gap: 24px;
        }
        #login-screen.hidden { display: none; }

        .login-logo {
            font-family: var(--mono);
            font-size: 48px;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            letter-spacing: 8px;
        }

        .login-subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }

        .login-fields {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 380px;
        }

        .login-fields input {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--mono);
            outline: none;
            transition: border-color 0.2s;
        }
        .login-fields input:focus {
            border-color: var(--accent);
        }
        .login-fields input::placeholder {
            color: #555;
        }

        .login-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-btn:active { opacity: 0.7; }
        .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        /* ── Chat Screen ──────────────────────────────────────────── */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        #chat-screen.active { display: flex; }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top, 12px));
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .soma-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }
        .soma-indicator.offline { background: var(--danger); box-shadow: 0 0 8px rgba(255,68,68,0.3); }
        .soma-indicator.thinking { animation: pulse 0.5s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header-title {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 3px;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 10px;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:active { background: var(--accent-dim); color: var(--accent); }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid rgba(0,255,136,0.1);
            border-bottom-right-radius: 4px;
        }

        .message.soma {
            align-self: flex-start;
            background: var(--soma-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.soma .engine-tag {
            display: inline-block;
            font-size: 10px;
            color: var(--text-dim);
            font-family: var(--mono);
            margin-top: 6px;
            opacity: 0.6;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            font-family: var(--mono);
            padding: 6px 12px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--soma-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.active { display: flex; gap: 4px; }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 12px 16px;
            padding-bottom: max(12px, var(--safe-bottom));
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            font-family: var(--font);
            padding: 10px 0;
            outline: none;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
        }
        #message-input::placeholder { color: #555; }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .voice-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 2px solid var(--border);
            color: var(--text-dim);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .voice-btn.recording {
            background: rgba(255,0,0,0.15);
            border-color: var(--danger);
            color: var(--danger);
            animation: voicePulse 1s ease-in-out infinite;
        }

        @keyframes voicePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.2); }
            50% { box-shadow: 0 0 0 12px rgba(255,68,68,0); }
        }

        /* Announce Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }

        .modal h3 {
            color: var(--accent);
            font-family: var(--mono);
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal textarea {
            width: 100%;
            background: #111;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: var(--font);
            resize: none;
            height: 100px;
            outline: none;
        }
        .modal textarea:focus { border-color: var(--accent); }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .modal-cancel {
            background: #222;
            color: var(--text-dim);
        }
        .modal-confirm {
            background: var(--accent);
            color: #000;
        }

        /* Settings page */
        .settings-panel {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 50;
            flex-direction: column;
            padding: 24px;
            padding-top: max(24px, env(safe-area-inset-top, 24px));
            overflow-y: auto;
        }
        .settings-panel.active { display: flex; }

        .settings-back {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            cursor: pointer;
            padding: 8px 0;
            text-align: left;
            font-family: var(--mono);
        }

        .settings-group {
            margin-top: 24px;
        }

        .settings-group h4 {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .settings-item {
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-item label {
            font-size: 14px;
        }

        .toggle {
            width: 44px;
            height: 24px;
            border-radius: 12px;
            background: #333;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle.on { background: var(--accent); }
        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            transition: transform 0.2s;
        }
        .toggle.on::after { transform: translateX(20px); }

        .logout-btn {
            margin-top: 32px;
            background: rgba(255,68,68,0.1);
            border: 1px solid rgba(255,68,68,0.2);
            border-radius: 12px;
            padding: 14px;
            color: var(--danger);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
    <div class="login-logo">SOMA</div>
    <div class="login-subtitle">Remote Access</div>
    <div class="login-fields">
        <input type="url" id="server-url" placeholder="https://your-soma:8100" autocomplete="url">
        <input type="password" id="api-key-input" placeholder="API Key" autocomplete="current-password">
        <button class="login-btn" id="login-btn" onclick="doLogin()">Verbinden</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
    <div class="chat-header">
        <div class="header-left">
            <div class="soma-indicator" id="status-indicator"></div>
            <span class="header-title">SOMA</span>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="openAnnounceModal()" title="Durchsage">📢</button>
            <button class="header-btn" onclick="openSettings()" title="Einstellungen">⚙️</button>
        </div>
    </div>

    <div class="messages-container" id="messages"></div>

    <div class="typing-indicator" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    </div>

    <div class="input-area">
        <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">🎤</button>
        <div class="input-wrapper">
            <textarea id="message-input" rows="1" placeholder="Nachricht an SOMA..." 
                      oninput="autoResizeInput(this)" onkeydown="handleInputKey(event)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
    </div>
</div>

<!-- Announce Modal -->
<div class="modal-overlay" id="announce-modal">
    <div class="modal">
        <h3>📢 Durchsage in der Wohnung</h3>
        <textarea id="announce-text" placeholder="Was soll SOMA in der Wohnung sagen?"></textarea>
        <div class="modal-buttons">
            <button class="modal-cancel" onclick="closeAnnounceModal()">Abbrechen</button>
            <button class="modal-confirm" onclick="sendAnnouncement()">Durchsagen</button>
        </div>
    </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settings-panel">
    <button class="settings-back" onclick="closeSettings()">← Zurück</button>

    <div class="settings-group">
        <h4>Verbindung</h4>
        <div class="settings-item">
            <label>Server</label>
            <span id="settings-server" style="color: var(--text-dim); font-family: var(--mono); font-size: 12px;"></span>
        </div>
        <div class="settings-item">
            <label>Status</label>
            <span id="settings-status" style="color: var(--accent); font-size: 13px;">Verbunden</span>
        </div>
    </div>

    <div class="settings-group">
        <h4>Sprache</h4>
        <div class="settings-item">
            <label>Antworten vorlesen</label>
            <div class="toggle" id="toggle-tts" onclick="toggleSetting('tts')"></div>
        </div>
        <div class="settings-item">
            <label>Spracherkennung</label>
            <div class="toggle on" id="toggle-stt" onclick="toggleSetting('stt')"></div>
        </div>
    </div>

    <button class="logout-btn" onclick="doLogout()">Abmelden</button>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────
let serverUrl = '';
let apiKey = '';
let sessionId = '';
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let ws = null;
let reconnectTimer = null;
let settings_tts = false;
let settings_stt = true;

// ── Persistence ──────────────────────────────────────────────────────
function saveAuth() {
    localStorage.setItem('soma_server', serverUrl);
    localStorage.setItem('soma_key', apiKey);
    localStorage.setItem('soma_session', sessionId);
    localStorage.setItem('soma_settings_tts', settings_tts);
}

function loadAuth() {
    serverUrl = localStorage.getItem('soma_server') || '';
    apiKey = localStorage.getItem('soma_key') || '';
    sessionId = localStorage.getItem('soma_session') || crypto.randomUUID();
    settings_tts = localStorage.getItem('soma_settings_tts') === 'true';
    if (settings_tts) document.getElementById('toggle-tts')?.classList.add('on');
}

// ── Login ────────────────────────────────────────────────────────────
async function doLogin() {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const urlInput = document.getElementById('server-url');
    const keyInput = document.getElementById('api-key-input');

    let url = urlInput.value.trim().replace(/\/+$/, '');
    const key = keyInput.value.trim();

    if (!url || !key) {
        errEl.textContent = 'Server-URL und API Key erforderlich';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Verbinde...';
    errEl.textContent = '';

    try {
        const resp = await fetch(`${url}/api/v1/remote/ping`, {
            headers: { 'X-API-Key': key },
        });
        if (!resp.ok) throw new Error(resp.status === 401 ? 'Ungültiger API Key' : `Fehler ${resp.status}`);

        serverUrl = url;
        apiKey = key;
        sessionId = crypto.randomUUID();
        saveAuth();
        showChat();
    } catch (e) {
        errEl.textContent = e.message || 'Verbindung fehlgeschlagen';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Verbinden';
    }
}

function doLogout() {
    localStorage.clear();
    serverUrl = '';
    apiKey = '';
    if (ws) { ws.close(); ws = null; }
    document.getElementById('chat-screen').classList.remove('active');
    document.getElementById('login-screen').classList.remove('hidden');
    closeSettings();
}

// ── Chat UI ──────────────────────────────────────────────────────────
function showChat() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-screen').classList.add('active');
    document.getElementById('settings-server').textContent = serverUrl;
    connectWS();
    addSystemMessage('Verbunden mit SOMA');
}

function addMessage(text, type, engineTag) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    if (engineTag && type === 'soma') {
        const tag = document.createElement('div');
        tag.className = 'engine-tag';
        tag.textContent = engineTag;
        div.appendChild(tag);
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function addSystemMessage(text) {
    addMessage(text, 'system');
}

function updateLastSomaMessage(text) {
    const msgs = document.querySelectorAll('.message.soma');
    if (msgs.length > 0) {
        const last = msgs[msgs.length - 1];
        // Preserve engine tag
        const tag = last.querySelector('.engine-tag');
        last.textContent = text;
        if (tag) last.appendChild(tag);
    }
}

function setTyping(on) {
    document.getElementById('typing').classList.toggle('active', on);
    if (on) {
        const container = document.getElementById('messages');
        container.scrollTop = container.scrollHeight;
    }
}

function setStatus(status) {
    const el = document.getElementById('status-indicator');
    el.className = 'soma-indicator';
    if (status === 'thinking') el.classList.add('thinking');
    else if (status === 'offline') el.classList.add('offline');
}

// ── WebSocket Connection ─────────────────────────────────────────────
function connectWS() {
    if (ws) { ws.close(); ws = null; }

    const wsUrl = serverUrl.replace(/^http/, 'ws') + '/api/v1/remote/ws';
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'auth', api_key: apiKey }));
        setStatus('online');
        document.getElementById('settings-status').textContent = 'Verbunden';
        if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'auth_ok') return;

        if (msg.type === 'error') {
            if (msg.message === 'Authentication failed') {
                doLogout();
                document.getElementById('login-error').textContent = 'Authentifizierung fehlgeschlagen';
                return;
            }
            addSystemMessage('Fehler: ' + msg.message);
            return;
        }

        if (msg.type === 'chunk') {
            setStatus('thinking');
            if (msg.is_final) {
                setTyping(false);
                setStatus('online');
                // Play TTS if enabled
                if (settings_tts && currentSomaResponse) {
                    speakResponse(currentSomaResponse);
                }
                currentSomaResponse = '';
            } else {
                if (!currentSomaResponse) {
                    // First chunk — create message bubble
                    addMessage('', 'soma');
                }
                currentSomaResponse += msg.text;
                updateLastSomaMessage(currentSomaResponse);
            }
        }

        if (msg.type === 'announced') {
            addSystemMessage('📢 Durchsage gesendet');
        }

        if (msg.type === 'pong') return;
    };

    ws.onclose = () => {
        setStatus('offline');
        document.getElementById('settings-status').textContent = 'Getrennt';
        if (!reconnectTimer) {
            reconnectTimer = setInterval(() => {
                if (!ws || ws.readyState === WebSocket.CLOSED) connectWS();
            }, 5000);
        }
    };

    ws.onerror = () => setStatus('offline');

    // Ping keepalive
    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
        }
    }, 30000);
}

let currentSomaResponse = '';

// ── Send Message ─────────────────────────────────────────────────────
function sendMessage() {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    setTyping(true);
    currentSomaResponse = '';

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'chat',
            message: text,
            session_id: sessionId,
            user_id: 'remote_user',
        }));
    } else {
        // Fallback: REST API with SSE
        sendViaREST(text);
    }
}

async function sendViaREST(text) {
    try {
        const resp = await fetch(`${serverUrl}/api/v1/remote/chat/stream`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': apiKey,
            },
            body: JSON.stringify({ message: text, session_id: sessionId }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let somaText = '';
        addMessage('', 'soma');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const lines = decoder.decode(value).split('\n');
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const chunk = JSON.parse(line.slice(6));
                    somaText += chunk.text;
                    updateLastSomaMessage(somaText);
                    if (chunk.is_final) {
                        setTyping(false);
                        if (settings_tts && somaText) speakResponse(somaText);
                    }
                } catch {}
            }
        }
        setTyping(false);
    } catch (e) {
        setTyping(false);
        addSystemMessage('Verbindungsfehler: ' + e.message);
    }
}

// ── Voice Input (Browser STT) ────────────────────────────────────────
function toggleVoice() {
    if (isRecording) {
        stopVoice();
    } else {
        startVoice();
    }
}

function startVoice() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        addSystemMessage('Spracherkennung nicht verfügbar in diesem Browser');
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = false;
    recognition.interimResults = true;

    const input = document.getElementById('message-input');
    const voiceBtn = document.getElementById('voice-btn');

    recognition.onstart = () => {
        isRecording = true;
        voiceBtn.classList.add('recording');
        input.placeholder = 'Höre zu...';
    };

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }
        input.value = transcript;

        if (event.results[0].isFinal) {
            stopVoice();
            sendMessage();
        }
    };

    recognition.onerror = (e) => {
        console.error('STT error:', e.error);
        stopVoice();
        if (e.error === 'not-allowed') {
            addSystemMessage('Mikrofon-Zugriff verweigert');
        }
    };

    recognition.onend = () => stopVoice();

    window._recognition = recognition;
    recognition.start();
}

function stopVoice() {
    isRecording = false;
    const voiceBtn = document.getElementById('voice-btn');
    voiceBtn.classList.remove('recording');
    document.getElementById('message-input').placeholder = 'Nachricht an SOMA...';
    if (window._recognition) {
        window._recognition.stop();
        window._recognition = null;
    }
}

// ── TTS Playback (Browser) ──────────────────────────────────────────
async function speakResponse(text) {
    try {
        // Try server-side TTS first (Piper voices)
        const resp = await fetch(`${serverUrl}/api/v1/remote/tts`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': apiKey,
            },
            body: JSON.stringify({ text }),
        });

        if (resp.ok) {
            const audioBlob = await resp.blob();
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.onended = () => URL.revokeObjectURL(audioUrl);
            await audio.play();
            return;
        }
    } catch (e) {
        console.warn('Server TTS failed, using browser TTS:', e);
    }

    // Fallback: Browser SpeechSynthesis
    if ('speechSynthesis' in window) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'de-DE';
        utter.rate = 1.0;
        speechSynthesis.speak(utter);
    }
}

// ── Announce ─────────────────────────────────────────────────────────
function openAnnounceModal() {
    document.getElementById('announce-modal').classList.add('active');
    document.getElementById('announce-text').focus();
}

function closeAnnounceModal() {
    document.getElementById('announce-modal').classList.remove('active');
    document.getElementById('announce-text').value = '';
}

function sendAnnouncement() {
    const text = document.getElementById('announce-text').value.trim();
    if (!text) return;

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'announce', message: text }));
    } else {
        // REST fallback
        fetch(`${serverUrl}/api/v1/remote/announce`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': apiKey,
            },
            body: JSON.stringify({ message: text }),
        }).then(() => addSystemMessage('📢 Durchsage gesendet'))
          .catch(e => addSystemMessage('Fehler: ' + e.message));
    }

    closeAnnounceModal();
}

// ── Settings ─────────────────────────────────────────────────────────
function openSettings() {
    document.getElementById('settings-panel').classList.add('active');
}
function closeSettings() {
    document.getElementById('settings-panel').classList.remove('active');
}

function toggleSetting(key) {
    const el = document.getElementById(`toggle-${key}`);
    if (key === 'tts') {
        settings_tts = !settings_tts;
        el.classList.toggle('on', settings_tts);
        saveAuth();
    }
}

// ── Input Helpers ────────────────────────────────────────────────────
function autoResizeInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// ── Init ─────────────────────────────────────────────────────────────
loadAuth();
if (serverUrl && apiKey) {
    document.getElementById('server-url').value = serverUrl;
    document.getElementById('api-key-input').value = apiKey;
    doLogin();
}
