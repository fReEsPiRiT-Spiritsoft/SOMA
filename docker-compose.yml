# ============================================================================
# SOMA-AI: Docker Compose Orchestration
# Services: PostgreSQL, Mosquitto (MQTT), Redis, Ollama
# Target: 32GB RAM / 12GB VRAM Debian System
# ============================================================================

services:
  # ── PostgreSQL: SSOT Database ──────────────────────────────────────────
  # Vision #13: KEIN Default-Passwort! Muss in .env definiert sein.
  # Ohne .env: PostgreSQL startet nicht → besser als ein offenes Default.
  postgres:
    image: postgres:16-alpine
    container_name: soma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soma_db}
      POSTGRES_USER: ${POSTGRES_USER:-soma}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?FEHLT: POSTGRES_PASSWORD in .env setzen}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - soma_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soma}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis: Deferred Reasoning Queue & Cache ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: soma-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - soma_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Mosquitto: MQTT Broker (Hardware Nervous System) ───────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: soma-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - soma_mqttdata:/mosquitto/data
      - soma_mqttlog:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Ollama: Local LLM Runtime (The Mind) ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: soma-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - soma_ollama_models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KV_CACHE_TYPE=q8_0
    # Vision #15: Healthcheck — erkennt ob Ollama API antwortet
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 20G

  # ── Asterisk Phone Gateway (Linhome SIP) ─────────────────────────────
  # Registers at sip.linhome.org → receives calls to +4929825810063
  # Hands incoming calls via ARI to brain_core PhonePipeline (async)
  # Requires: VODAFONE_SIP_HOST, VODAFONE_SIP_USER, VODAFONE_SIP_PASS in .env
  asterisk:
    build: ./asterisk
    container_name: soma-asterisk
    restart: unless-stopped
    # network_mode: host is required for SIP — avoids NAT translation issues
    # that would break SIP registration and RTP audio streams.
    network_mode: host
    environment:
      - VODAFONE_SIP_HOST=${VODAFONE_SIP_HOST:-sip.linhome.org}
      - VODAFONE_SIP_USER=${VODAFONE_SIP_USER:-pattyhomeserver}
      - VODAFONE_SIP_PASS=${VODAFONE_SIP_PASS:-HIER_DEIN_LINHOME_PASSWORT}
      - ASTERISK_ARI_PASS=${ASTERISK_ARI_PASS:-soma_ari_secret}
      # Linphone: Lokaler SIP-Client (Smartphone/Tablet via LAN/VPN)
      # Linphone App: SIP-Adresse = sip:soma@<SOMA_IP>, Passwort = LINPHONE_SIP_PASS
      - LINPHONE_SIP_PASS=${LINPHONE_SIP_PASS:-soma_linphone_secret}
    volumes:
      - ./asterisk/config:/etc/asterisk           # Asterisk config files
      - ./data/phone_recordings:/var/spool/asterisk/recording  # Caller recordings → STT
      - ./data/phone_sounds:/var/lib/asterisk/sounds/soma      # SOMA TTS → ARI play
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  soma_pgdata:
    driver: local
  soma_redisdata:
    driver: local
  soma_mqttdata:
    driver: local
  soma_mqttlog:
    driver: local
  soma_ollama_models:
    driver: local

networks:
  default:
    name: soma-network
    driver: bridge
